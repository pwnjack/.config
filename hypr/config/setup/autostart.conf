# System UI Components
exec-once = waybar
exec-once = swaync
exec-once = swayosd-server &

# Wallpaper Management
exec-once = awww-daemon
exec-once = sleep 0.5 && bash -c 'wp=$(grep "^wallpaper = " $HOME/.config/waypaper/config.ini 2>/dev/null | sed "s/^wallpaper = //" | sed "s|^~|$HOME|"); [ -f "$wp" ] && awww img "$wp" || { monitor=$(cat $HOME/.config/options/mainmonitor 2>/dev/null || echo "eDP-1"); cache=$(ls -t $HOME/.cache/awww/*/"$monitor" 2>/dev/null | head -n1); [ -f "$cache" ] && wp=$(grep -oE "/.+$" "$cache") && [ -f "$wp" ] && awww img "$wp"; }'
exec-once = $HOME/.config/sddm/watch_wallpaper.sh &

# System Services
exec-once = hypridle
exec-once = $polkitAgent
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# AGS Settings Panel
exec-once = ags run $HOME/.config/ags/app.ts &

# User Startup Script
exec-once = $HOME/.config/scripts/hyprland/startup.sh
